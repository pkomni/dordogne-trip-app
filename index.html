    a {

    }

</style>

<body>



<header>Dordogne Trip Planner – 23–29 June</header>

    <button onclick="autoOptimizeItinerary()" 
style="
    margin: 10px;
    padding: 10px 14px;
    border-radius: 8px;
    border: none;
    background: #2c3e50;
    color: white;
    cursor: pointer;
">
🧠 Auto-Optimize Trip
</button>

<div id="map" style="height: 400px; margin: 10px; border-radius: 12px;"></div>

<div id="days-container"></div>



<script>

    // -----------------------------
// TRIP INTELLIGENCE ENGINE
// -----------------------------

function getExperienceScore(id) {
    const a = activities[id];

    let scenic = 3;
    let kid = a.kidEnergy === "high" ? 5 : a.kidEnergy === "medium" ? 7 : 9;
    let effort = a.type === "outdoor" ? 6 : 8;

    // default assumptions (can refine later per activity)
    let crowd = 6;
    let heatRisk = a.type === "outdoor" ? 7 : 3;

    return {
        scenic,
        kid,
        effort,
        crowd,
        heatRisk
    };
}

    function scoreDay(day) {
    let scenic = 0;
    let kid = 0;
    let effort = 0;
    let crowd = 0;
    let heat = 0;

    day.activities.forEach(id => {
        const s = getExperienceScore(id);

        scenic += s.scenic;
        kid += s.kid;
        effort += s.effort;
        crowd += s.crowd;
        heat += s.heatRisk;
    });

    const drivingKm = calculateRouteDistance(day.activities);

    const drivingPenalty = drivingKm * 0.4;

    const totalScore =
        (scenic * 1.5) +
        (kid * 1.2) -
        (effort * 0.8) -
        (crowd * 0.3) -
        (heat * 0.4) -
        drivingPenalty;

    return {
        scenic,
        kid,
        effort,
        crowd,
        heat,
        drivingKm,
        totalScore: Math.round(totalScore)
    };
}
    
    // -----------------------------
// DISTANCE ENGINE (Haversine)
// -----------------------------

function getDistanceKm(a, b) {
    const R = 6371;

    const dLat = (b.lat - a.lat) * Math.PI / 180;
    const dLon = (b.lng - a.lng) * Math.PI / 180;

    const lat1 = a.lat * Math.PI / 180;
    const lat2 = b.lat * Math.PI / 180;

    const x =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.sin(dLon / 2) *
        Math.cos(lat1) *
        Math.cos(lat2);

    const y = 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));

    return R * y;
}

// -----------------------------
// ENHANCED ACTIVITIES (DORDOGNE-OPTIMIZED)
// -----------------------------

const activities = {

    },

};



// -----------------------------

// DAY PLANS

// -----------------------------

// -----------------------------
// ENHANCED DORDOGNE ITINERARY (KID-OPTIMIZED)
// -----------------------------
let days = [
    {
        date: "23 June",
        title: "Arrival & Relax",
        activities: ["market_sarlat"],
        notes: "Arrival day. Keep it light, groceries, pool, recovery from travel."
    },

    {
        date: "24 June",
        title: "Sarlat Morning + Easy Afternoon",
        activities: ["market_sarlat", "marqueyssac"],
        notes: "Slow start, explore town, shaded gardens in afternoon."
    },

    {
        date: "25 June",
        title: "Castles Day (Beynac & Castelnaud)",
        activities: ["castelnaud_castle", "beynac_castle", "gabare_boat"],
        notes: "Clustered medieval valley day. Short drives only."
    },

    {
        date: "26 June",
        title: "Caves & Cool Indoor Escape",
        activities: ["lascaux_iv"],
        notes: "Indoor day to avoid heat. Very kid-friendly."
    },

    {
        date: "27 June",
        title: "River Adventure Day",
        activities: ["canoe_dordogne"],
        notes: "Active water day. Bring snacks, hats, sunscreen."
    },

    {
        date: "28 June",
        title: "Balloon or Backup Adventure + Gardens",
        activities: ["balloon", "marqueyssac"],
        notes: "Weather-dependent day. Swap balloon if wind/rain."
    },

    {
        date: "29 June",
        title: "Food & Local Experience",
        activities: ["night_market"],
        notes: "Relaxed final day with food market and walking."
    }
];



// -----------------------------
// DORDOGNE PLANNING ENGINE V2
// -----------------------------

const zoneMap = {
    beynac_castle: "river_west",
    castelnaud_castle: "river_west",
    gabare_boat: "river_west",
    marqueyssac: "river_west",
    canoe_dordogne: "river_core",
    lascaux_iv: "north_inland",
    market_sarlat: "sarlat",
    night_market: "sarlat",
    balloon: "regional_air"
};

function getActivityScore(activityId) {
    const a = activities[activityId];

    let energy = 1;
    if (a.kidEnergy === "low") energy = 1;
    if (a.kidEnergy === "medium") energy = 2;
    if (a.kidEnergy === "high") energy = 3;

    let travelWeight = 1;
    if (a.type === "outdoor") travelWeight += 1;
    if (a.type === "indoor") travelWeight -= 0.5;

    return {
        energy,
        travelWeight,
        zone: zoneMap[activityId] || "unknown"
    };
}

    function analyzeDay(day) {
    let totalEnergy = 0;
    let zones = new Set();
    let travelLoad = 0;

    (day.activities || []).forEach(id => {
        if (!activities[id]) return;

        const score = getActivityScore(id);
        totalEnergy += score.energy;
        travelLoad += score.travelWeight;
        zones.add(score.zone);
    });

    return {
        totalEnergy,
        travelLoad,
        zoneSpread: zones.size,
        risk:
            totalEnergy >= 5 || zones.size >= 3
                ? "high"
                : totalEnergy >= 3
                ? "medium"
                : "low"
    };
}

    function getRiskBadge(risk) {
    if (risk === "high") return "⚠️ Too intense for kids";
    if (risk === "medium") return "🟡 Moderate day";
    return "🟢 Relaxed day";
}

    // -----------------------------
// AUTO ITINERARY OPTIMIZER V1
// -----------------------------

function calculateDayEnergy(activityList) {
    return activityList.reduce((sum, id) => {
        const a = activities[id];

        let energy = 1;
        if (a.kidEnergy === "medium") energy = 2;
        if (a.kidEnergy === "high") energy = 3;

        return sum + energy;
    }, 0);
}

function groupByZone(activityIds) {
    const zones = {};
    activityIds.forEach(id => {
        const z = zoneMap[id] || "unknown";
        if (!zones[z]) zones[z] = [];
        zones[z].push(id);
    });
    return zones;
}

    function buildOptimizedDays(allActivities) {
    const zones = groupByZone(allActivities);

    const days = [];

    const zoneOrder = [
        "sarlat",
        "river_west",
        "river_core",
        "north_inland",
        "regional_air"
    ];

    zoneOrder.forEach(zone => {
        const zoneActivities = zones[zone];
        if (!zoneActivities || zoneActivities.length === 0) return;

        let currentDay = [];
        let currentEnergy = 0;

        zoneActivities.forEach(id => {
            const energy = activities[id].kidEnergy === "high" ? 3 :
                           activities[id].kidEnergy === "medium" ? 2 : 1;

            // cap per day (prevents overload)
            if (currentEnergy + energy > 4) {
                days.push({
                    date: null,
                    title: zone + " day",
                    activities: currentDay
                });

                currentDay = [];
                currentEnergy = 0;
            }

            currentDay.push(id);
            currentEnergy += energy;
        });

        if (currentDay.length > 0) {
            days.push({
                date: null,
                title: zone + " day",
                activities: currentDay
            });
        }
    });

    return days;
}

    // -----------------------------
// MAIN AUTO-OPTIMIZER
// -----------------------------

function autoOptimizeItinerary() {
    const all = Object.keys(activities);

    const clusters = clusterByProximity(all);

    const daysOptimized = clusters.map((cluster, i) => ({
        date: "",
        title: "Optimized Day " + (i + 1),
        activities: cluster
    }));

    const startDate = new Date("2026-06-23");

    daysOptimized.forEach((day, i) => {
        const d = new Date(startDate);
        d.setDate(startDate.getDate() + i);

        day.date = d.toLocaleDateString("en-GB", {
            day: "numeric",
            month: "long"
        });
    });

    days = daysOptimized;
    renderDays();
}

    let map;
let markersLayer;
let routeLayer;

function initMap() {
    map = L.map('map').setView([44.85, 1.25], 10);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    markersLayer = L.layerGroup().addTo(map);
    routeLayer = L.layerGroup().addTo(map);
}



    function renderMap(dayIndex = 0) {
    markersLayer.clearLayers();
    routeLayer.clearLayers();

    const day = days[dayIndex];
    if (!day) return;

    const coords = [];

    day.activities.forEach(id => {
        const a = activities[id];
        if (!a || !a.lat || !a.lng) return;

        const marker = L.marker([a.lat, a.lng])
            .bindPopup(`<b>${a.name}</b><br>${a.notes}`);

        markersLayer.addLayer(marker);

        coords.push([a.lat, a.lng]);
    });

    // draw route line
    if (coords.length > 1) {
        const polyline = L.polyline(coords, {
            color: '#2c3e50',
            weight: 4
        });

        routeLayer.addLayer(polyline);

        map.fitBounds(polyline.getBounds(), {
            padding: [30, 30]
        });
    } else if (coords.length === 1) {
        map.setView(coords[0], 11);
    }
}

  function suggestImprovements(day) {
    const suggestions = [];
    const stats = analyzeDay(day);

    if (stats.travelLoad > 6) {
        suggestions.push("High driving load: try clustering activities closer together.");
    }

    if (stats.totalEnergy >= 5) {
        suggestions.push("Busy day for kids: consider adding rest break or removing one activity.");
    }

    if (stats.zoneSpread >= 3) {
        suggestions.push("Too geographically spread: may involve long driving between stops.");
    }

    return suggestions;
}

// -----------------------------

// RENDER DAYS

// -----------------------------

function renderDays() {
    const container = document.getElementById("days-container");
    container.innerHTML = "";

    days.forEach((day, index) => {
        const card = document.createElement("div");
        card.className = "day-card";
        card.draggable = true;
        card.dataset.index = index;

        const analysis = analyzeDay(day);
        const suggestions = suggestImprovements(day);

        let badge = "🟢 Great Day";
        if (analysis.totalEnergy >= 5) badge = "⚠️ Intense Day";
        if (analysis.travelLoad > 6) badge = "🚗 Driving Heavy";
        if (analysis.zoneSpread >= 3) badge = "🧭 Spread Out";

        card.innerHTML = `
            <h2>📅 ${day.date || ""} – ${day.title}</h2>

            <div style="margin-bottom:8px;">
                ${badge}
                <small style="margin-left:10px; color:#666;">
                    Energy: ${analysis.totalEnergy} |
                    Zones: ${analysis.zoneSpread} |
                    Travel load: ${analysis.travelLoad.toFixed(1)}
                </small>
            </div>

            <div>
                ${day.activities.map(id => {
                    const a = activities[id];
                    if (!a) return "";
                    return `
                        <div class="activity">
                            <div class="activity-header">
                                <span class="icon">${a.icon}</span>
                                <strong>${a.name}</strong>
                            </div>

                            <div><strong>Duration:</strong> ${a.duration}</div>
                            <div><strong>Best time:</strong> ${a.bestTime}</div>
                            <div><strong>Price:</strong> ${a.price}</div>

                            <div>
                                Booking:
                                ${a.booking === "None"
                                    ? "No booking needed"
                                    : `<a href="${a.booking}" target="_blank">Link</a>`
                                }
                            </div>

                            <div>
                                Map:
                                <a href="${a.map}" target="_blank">Open map</a>
                            </div>

                            <em>${a.notes}</em>

                            ${a.photo ? `<img src="${a.photo}" alt="${a.name}">` : ""}
                        </div>
                    `;
                }).join("")}

                ${day.activities.length === 0
                    ? "<em>Arrival, groceries, pool time.</em>"
                    : ""
                }
            </div>

            ${
                suggestions.length > 0
                ? `
                <div style="margin-top:10px; padding:8px; background:#fff3cd; border-radius:8px;">
                    <strong>💡 Suggestions:</strong>
                    <ul>
                        ${suggestions.map(s => `<li>${s}</li>`).join("")}
                    </ul>
                </div>
                `
                : ""
            }
        `;

        card.addEventListener("dragstart", dragStart);
        card.addEventListener("dragover", dragOver);
        card.addEventListener("drop", drop);

                container.appendChild(card);

        card.addEventListener("click", () => {
            renderMap(index);
        });
    });
}



let draggedIndex = null;



function dragStart(e) {

    draggedIndex = e.target.closest(".day-card")?.dataset.index;

}



function dragOver(e) {

    e.preventDefault();

}



function drop(e) {
    const targetCard = e.target.closest(".day-card");
    if (!targetCard) return;

    const targetIndex = Number(targetCard.dataset.index);
    const dragged = Number(draggedIndex);

    if (dragged === targetIndex) return;

    const newDays = [...days];

    [newDays[dragged], newDays[targetIndex]] =
    [newDays[targetIndex], newDays[dragged]];

    days = newDays;
    renderDays();
}

    // -----------------------------
// MAP CLUSTERING ENGINE
// -----------------------------

function clusterByProximity(activityIds) {
    const clusters = [];

    const remaining = [...activityIds];

    while (remaining.length > 0) {
        const seed = remaining.shift();
        const seedPos = activities[seed];

        const cluster = [seed];

        for (let i = remaining.length - 1; i >= 0; i--) {
            const id = remaining[i];
            const pos = activities[id];

            const dist = getDistanceKm(seedPos, pos);

            // 25km radius = same “day cluster”
            if (dist <= 25) {
                cluster.push(id);
                remaining.splice(i, 1);
            }
        }

        clusters.push(cluster);
    }

    return clusters;
}

    function calculateRouteDistance(activityList) {
    if (activityList.length <= 1) return 0;

    let total = 0;

    for (let i = 0; i < activityList.length - 1; i++) {
        const a = activities[activityList[i]];
        const b = activities[activityList[i + 1]];

        total += getDistanceKm(a, b);
    }

    return total;
}

    function buildMapOptimizedDays(activityIds) {
    const clusters = clusterByProximity(activityIds);

    const days = [];

    clusters.forEach(cluster => {
        // sort cluster to minimize travel path (simple greedy)
        const sorted = [];

        let current = cluster[0];
        sorted.push(current);
        cluster.splice(0, 1);

        while (cluster.length > 0) {
            let bestIndex = 0;
            let bestDist = Infinity;

            cluster.forEach((id, i) => {
                const d = getDistanceKm(
                    activities[current],
                    activities[id]
                );

                if (d < bestDist) {
                    bestDist = d;
                    bestIndex = i;
                }
            });

            current = cluster[bestIndex];
            sorted.push(current);
            cluster.splice(bestIndex, 1);
        }

        days.push({
            date: null,
            title: "Optimized route day",
            activities: sorted
        });
    });

    return days;
}

initMap();
renderDays();
renderMap(0);

</script>
