<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dordogne Trip Planner</title>



<style>

    body {

        font-family: Arial, sans-serif;

        margin: 0;

        background: #f5f5f5;

    }

    header {

        background: #2c3e50;

        color: white;

        padding: 20px;

        text-align: center;

        font-size: 22px;

    }

    #days-container {

        padding-bottom: 20px;

    }

    .day-card {

        background: white;

        margin: 12px;

        padding: 15px;

        border-radius: 12px;

        box-shadow: 0 2px 5px rgba(0,0,0,0.1);

        cursor: grab;

    }

    .day-card h2 {

        margin: 0 0 10px 0;

        display: flex;

        align-items: center;

        gap: 10px;

        font-size: 18px;

    }

    .activity {

        margin: 10px 0;

        padding: 12px;

        background: #eef2f3;

        border-radius: 8px;

    }

    .activity-header {

        display: flex;

        align-items: center;

        gap: 8px;

        margin-bottom: 4px;

    }

    .icon {

        font-size: 22px;

    }

    .activity img {

        width: 100%;

        border-radius: 8px;

        margin-top: 8px;

        max-height: 200px;

        object-fit: cover;

    }

    a {

        color: #2980b9;

        text-decoration: none;

    }

</style>

</head>



<body>



<header>Dordogne Trip Planner – 23–29 June</header>



<div id="days-container"></div>



<script>

// -----------------------------
// ENHANCED ACTIVITIES (DORDOGNE-OPTIMIZED)
// -----------------------------
const activities = {
    beynac_castle: {
        name: "Château de Beynac",
        icon: "🏰",
        photo: "images/beynac.jpg",
        price: "€11 adult / €7 child",
        booking: "https://www.beynac.com",
        map: "https://maps.app.goo.gl/",
        notes: "Very steep medieval castle. Go early morning to avoid heat.",
        duration: "1.5–2h",
        type: "outdoor",
        kidEnergy: "medium",
        bestTime: "morning"
    },

    castelnaud_castle: {
        name: "Château de Castelnaud",
        icon: "🛡️",
        photo: "images/castelnaud.jpg",
        price: "€12 adult / €7.50 child",
        booking: "https://castelnaud.com",
        map: "https://maps.app.goo.gl/",
        notes: "Best castle for kids: catapults, armor, live demos.",
        duration: "2–3h",
        type: "outdoor",
        kidEnergy: "high",
        bestTime: "morning"
    },

    lascaux_iv: {
        name: "Lascaux IV – Cave Art Centre",
        icon: "🕳️",
        photo: "images/lascaux.jpg",
        price: "€22 adult / €14 child",
        booking: "https://lascaux.fr",
        map: "https://maps.app.goo.gl/",
        notes: "Indoor, cool temperature, perfect midday escape.",
        duration: "2h",
        type: "indoor",
        kidEnergy: "low",
        bestTime: "afternoon"
    },

    gabare_boat: {
        name: "Gabare Boat Ride – La Roque-Gageac",
        icon: "⛵",
        photo: "images/gabare.jpg",
        price: "€11 adult / €8 child",
        booking: "https://gabare-norbert.com",
        map: "https://maps.app.goo.gl/",
        notes: "Relaxing river cruise, great break from walking.",
        duration: "1h",
        type: "outdoor",
        kidEnergy: "low",
        bestTime: "afternoon"
    },

    canoe_dordogne: {
        name: "Canoe Dordogne – Family Route",
        icon: "🛶",
        photo: "images/canoe.jpg",
        price: "€20–25 per person",
        booking: "https://canoe-dordogne.com",
        map: "https://maps.app.goo.gl/",
        notes: "Gentle downstream float. Kids 6+ OK. Bring water + hats.",
        duration: "2–3h",
        type: "outdoor",
        kidEnergy: "high",
        bestTime: "morning"
    },

    marqueyssac: {
        name: "Jardins de Marqueyssac",
        icon: "🌿",
        photo: "images/marqueyssac.jpg",
        price: "€11 adult / €5 child",
        booking: "https://marqueyssac.com",
        map: "https://maps.app.goo.gl/",
        notes: "Shaded paths, viewpoints, playground — perfect late afternoon.",
        duration: "2h",
        type: "outdoor",
        kidEnergy: "medium",
        bestTime: "late afternoon"
    },

    balloon: {
        name: "Hot Air Balloon – Dordogne Valley",
        icon: "🎈",
        photo: "images/balloon.jpg",
        price: "€200–250 per person",
        booking: "https://montgolfiere-dordogne.com",
        map: "https://maps.app.goo.gl/",
        notes: "Weather dependent sunrise experience.",
        duration: "3h total",
        type: "outdoor",
        kidEnergy: "medium",
        bestTime: "early morning"
    },

    market_sarlat: {
        name: "Sarlat Market",
        icon: "🛍️",
        photo: "images/market_sarlat.jpg",
        price: "Free",
        booking: "None",
        map: "https://maps.app.goo.gl/",
        notes: "Best early morning before crowds.",
        duration: "2h",
        type: "outdoor",
        kidEnergy: "low",
        bestTime: "morning"
    },

    night_market: {
        name: "Night Food Market – Sarlat Region",
        icon: "🍽️",
        photo: "images/night_market.jpg",
        price: "€10–15 per meal",
        booking: "None",
        map: "https://maps.app.goo.gl/",
        notes: "Casual dining, music, safe for kids.",
        duration: "2h+",
        type: "outdoor",
        kidEnergy: "low",
        bestTime: "evening"
    }
};



// -----------------------------

// DAY PLANS

// -----------------------------

// -----------------------------
// ENHANCED DORDOGNE ITINERARY (KID-OPTIMIZED)
// -----------------------------
let days = [
    {
        date: "23 June",
        title: "Arrival & Relax",
        activities: ["market_sarlat"],
        notes: "Arrival day. Keep it light, groceries, pool, recovery from travel."
    },

    {
        date: "24 June",
        title: "Sarlat Morning + Easy Afternoon",
        activities: ["market_sarlat", "marqueyssac"],
        notes: "Slow start, explore town, shaded gardens in afternoon."
    },

    {
        date: "25 June",
        title: "Castles Day (Beynac & Castelnaud)",
        activities: ["castelnaud_castle", "beynac_castle", "gabare_boat"],
        notes: "Clustered medieval valley day. Short drives only."
    },

    {
        date: "26 June",
        title: "Caves & Cool Indoor Escape",
        activities: ["lascaux_iv"],
        notes: "Indoor day to avoid heat. Very kid-friendly."
    },

    {
        date: "27 June",
        title: "River Adventure Day",
        activities: ["canoe_dordogne"],
        notes: "Active water day. Bring snacks, hats, sunscreen."
    },

    {
        date: "28 June",
        title: "Balloon or Backup Adventure + Gardens",
        activities: ["balloon", "marqueyssac"],
        notes: "Weather-dependent day. Swap balloon if wind/rain."
    },

    {
        date: "29 June",
        title: "Food & Local Experience",
        activities: ["night_market"],
        notes: "Relaxed final day with food market and walking."
    }
];



// -----------------------------

// RENDER DAYS

// -----------------------------

function renderDays() {

    const container = document.getElementById("days-container");

    container.innerHTML = "";



    days.forEach((day, index) => {

        const card = document.createElement("div");

        card.className = "day-card";

        card.draggable = true;

        card.dataset.index = index;



        card.innerHTML = `

            const analysis = analyzeDay(day);

card.innerHTML = `
    <h2>📅 ${day.date} – ${day.title}</h2>
    <div style="margin-bottom:8px;">
        ${getRiskBadge(analysis.risk)}
        <small style="margin-left:10px; color:#666;">
            Energy: ${analysis.totalEnergy} | Zones: ${analysis.zoneSpread} | Travel load: ${analysis.travelLoad.toFixed(1)}
        </small>
    </div>
`;

            <div>

                ${day.activities.map(id => `

                    <div class="activity">

                        <div class="activity-header">

                            <span class="icon">${activities[id].icon}</span>

                            <strong>${activities[id].name}</strong>

                        </div>

                        <div><strong>Duration:</strong> ${activities[id].duration}</div>
<div><strong>Best time:</strong> ${activities[id].bestTime}</div>
<div><strong>Price:</strong> ${activities[id].price}</div>

                        Booking: ${

                            activities[id].booking === "None"

                            ? "No booking needed"

                            : `<a href="${activities[id].booking}" target="_blank">${activities[id].booking}</a>`

                        }<br>

                        Map: <a href="${activities[id].map}" target="_blank">Open map</a><br>

                        <em>${activities[id].notes}</em>

                        ${activities[id].photo ? `<img src="${activities[id].photo}" alt="${activities[id].name}">` : ""}

                    </div>

                `).join("")}

                ${day.activities.length === 0 ? "<em>Arrival, groceries, and pool time at the house.</em>" : ""}

            </div>

        `;



        // Drag events

        card.addEventListener("dragstart", dragStart);

        card.addEventListener("dragover", dragOver);

        card.addEventListener("drop", drop);



        container.appendChild(card);

    });

}



let draggedIndex = null;



function dragStart(e) {

    draggedIndex = e.target.dataset.index;

}



function dragOver(e) {

    e.preventDefault();

}



function drop(e) {
    const targetCard = e.target.closest(".day-card");
    if (!targetCard) return;

    const targetIndex = targetCard.dataset.index;

    const newDays = [...days];
    const temp = newDays[draggedIndex];
    newDays[draggedIndex] = newDays[targetIndex];
    newDays[targetIndex] = temp;

    // analyze risk after swap
    const beforeRisk = analyzeDay(days[draggedIndex]).risk;
    const afterRisk = analyzeDay(newDays[targetIndex]).risk;

    const riskySwap =
        beforeRisk === "high" || afterRisk === "high";

    if (riskySwap) {
        const ok = confirm(
            "⚠️ This swap creates a very intense day for kids (long travel or packed schedule). Continue?"
        );

        if (!ok) return;
    }

    days = newDays;
    renderDays();
}

// -----------------------------
// DORDOGNE PLANNING ENGINE V2
// -----------------------------

const zoneMap = {
    beynac_castle: "river_west",
    castelnaud_castle: "river_west",
    gabare_boat: "river_west",
    marqueyssac: "river_west",
    canoe_dordogne: "river_core",
    lascaux_iv: "north_inland",
    market_sarlat: "sarlat",
    night_market: "sarlat",
    balloon: "regional_air"
};

function getActivityScore(activityId) {
    const a = activities[activityId];

    let energy = 1;
    if (a.kidEnergy === "low") energy = 1;
    if (a.kidEnergy === "medium") energy = 2;
    if (a.kidEnergy === "high") energy = 3;

    let travelWeight = 1;
    if (a.type === "outdoor") travelWeight += 1;
    if (a.type === "indoor") travelWeight -= 0.5;

    return {
        energy,
        travelWeight,
        zone: zoneMap[activityId] || "unknown"
    };
}

    function analyzeDay(day) {
    let totalEnergy = 0;
    let zones = new Set();
    let travelLoad = 0;

    day.activities.forEach(id => {
        const score = getActivityScore(id);
        totalEnergy += score.energy;
        travelLoad += score.travelWeight;
        zones.add(score.zone);
    });

    const zoneSpread = zones.size;

    let risk = "low";

    if (totalEnergy >= 5) risk = "high";
    else if (totalEnergy >= 3) risk = "medium";

    if (zoneSpread >= 3) risk = "high";

    return {
        totalEnergy,
        travelLoad,
        zoneSpread,
        risk
    };
}

    function getRiskBadge(risk) {
    if (risk === "high") return "⚠️ Too intense for kids";
    if (risk === "medium") return "🟡 Moderate day";
    return "🟢 Relaxed day";
}

renderDays();

</script>



</body>

</html>
